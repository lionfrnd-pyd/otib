services:
  - type: web
    name: otib-api
    runtime: node
    nodeVersion: 22.11.0
    rootDir: .
    buildCommand: npm install && VITE_BASE=/ npm run build
    startCommand: npm run server
    envVars:
      - key: CORS_ORIGIN
        value: https://lionfrnd-pyd.github.io
      - key: VITE_BASE
        value: /
